h2 {

.options {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px,1fr));
  gap: 8px;
  padding: 12px;
  text-align: left;
}

.options label {
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
}

.cards {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 10px;
  justify-content: center;
  justify-items: center;
  margin: 12px auto 24px;
}

/* 1장 */
.cards > .card-toggle:only-child {
  grid-column: 2;
}

/* 2장 – 첫 카드는 2열, 두 번째는 3열 */
.cards > .card-toggle:nth-child(1):nth-last-child(2) {
  grid-column: 2;
}
.cards > .card-toggle:nth-child(2):nth-last-child(1) {
  grid-column: 3;
}

.card {
  width: 100%;
  max-width: 120px;
  border: 1px solid #ccc;
  border-radius: 8px;
  padding: 8px;
  background: #fff;
  cursor: pointer;
}

.card-front {
  font-weight: bold;
}

.card img {
  width: 100%;
  border-radius: 6px;
}

.card-meaning {
  display: none;
  font-size: 0.85rem;
  margin-top: 6px;
  color: #555;
}

.card-toggle {
  width: 100%;

  border: 1px solid #ccc;

  padding: 8px 6px;
  background: #fff;
  cursor: pointer;

  word-break: break-word;
  overflow-wrap: break-word;
  white-space: normal;
}

.card-face {
  font-weight: bold;
  text-align: center;
}

.card-meaning {
  word-break: break-word;
  overflow-wrap: break-word;
  white-space: normal;
  line-height: 1.3;
}

.hexagram {
  display: flex;
  flex-direction: column;
  font-size: 1.2rem;
  margin-top: 4px;
}

button {
  padding: 8px 16px;
  border: none;
  border-radius: 6px;
  background: #4CAF50;
  color: #fff;
  cursor: pointer;
}

button:hover {

footer {

{ id: "hangul_oracle",
  name: "Hangeul Oracle",
  mode: "hangul",
  count: 3,
  items: {
    initials: {
      'ㄱ': '시작·추진·돌입 — 새싹처럼 성장의 첫 움직임. 행동을 개시하고 방향을 정한다.',
      'ㄴ': '수용·안정·조율 — 외부의 영향을 받아들이며 균형을 만든다. 완급 조절이 필요한 때.',
      'ㄷ': '결단·방향·변화 — 선택과 행동의 분기점. 결심의 힘이 현실을 바꾼다.',
      'ㄹ': '변화·순환·전환 — 고정된 상태를 움직이는 불꽃. 감정과 생각을 새 흐름으로 이끈다.',
      'ㅁ': '내면·정착·안정 — 안정 지대에서 중심을 세운다. 현실의 뿌리를 단단히 한다.',
      'ㅂ': '표현·확산·창조 — 내면의 것을 외부로 퍼뜨린다. 주저하지 말고 드러내라.',
      'ㅅ': '판단·통찰·절제 — 분별의 시점. 냉정함으로 진실을 본다.',
      'ㅇ': '순환·완성·무 — 감정의 흐름이 한 주기를 마친다. 비움 속에서 새 생명이 시작된다.',
      'ㅈ': '관계·교류·이성 — 상호작용의 지점. 이해와 거리감의 균형을 잡는다.',
      'ㅊ': '도전·확장·모험 — 새로운 불씨를 일으킨다. 위험 속에 기회가 숨어 있다.',
      'ㅋ': '실험·탐색·시도 — 작은 움직임 속의 잠재력. 실패조차 다음 단계의 토양이다.',
      'ㅌ': '단절·정리·정화 — 잘라내야 새것이 온다. 남은 미련을 정리하라.',
      'ㅍ': '정화·휴식·회복 — 멈춤이 곧 흐름의 시작. 쉬어야 방향이 선명해진다.',
      'ㅎ': '해방·소멸·재시작 — 불로 덮고 태워내는 정화. 끝은 곧 새로운 출발.',
      'ㄲ': '폭발·가속·확산 — 억눌린 힘의 분출. 추진이 너무 빠르면 소모 주의.',
      'ㄸ': '고착·집중·고정 — 하나의 결심이 굳어지는 때. 변화의 타이밍을 점검하라.',
      'ㅃ': '욕망·창조·과열 — 강한 의욕이 현실을 이끈다. 그러나 불이 과하면 탈이 난다.',
      'ㅆ': '냉철·단절·차가움 — 감정 없는 판단. 완전한 정리와 끝맺음의 상징.',
      'ㅉ': '집중·결속·의식 — 한 점으로 모이는 의지. 강력한 집중력의 완성.'
    },
    vowels: {
      'ㅏ': '발산·열정 — 외향적 표현, 의지의 불꽃. 지금 바로 움직이라.',

function drawCards(site) {

  /* 🟣 Astrology card */
  if (site.mode === "astro") {
    const g = site.groups;
    const house = g.houses[Math.floor(Math.random() * g.houses.length)];
    const sign = g.signs[Math.floor(Math.random() * g.signs.length)];
    const planet = g.planets[Math.floor(Math.random() * g.planets.length)];

    return [house, sign, planet].map(item => `
      <div class="card-toggle" style="width:120px; text-align:center;">
        <div class="card-face"><b>${item[0]}</b></div>
        <div class="card-meaning" style="display:none;"><small>${item[1]}</small></div>
      </div>
    `).join("");
  }

  /* 🟣 Hangeul Oracle */
  if (site.mode === "hangul") {
    const pick = obj => {
      const keys = Object.keys(obj);
      const k = keys[Math.floor(Math.random() * keys.length)];
      return [k, obj[k]];
    };
    const ini = pick(site.items.initials);
    const vow = pick(site.items.vowels);
    const fin = pick(site.items.finals);

    return [ini, vow, fin].map(([k, v]) => `
      <div class="card-toggle" style="width:120px; text-align:center;">
        <div class="card-face"><b>${k}</b></div>
        <div class="card-meaning" style="display:none;"><small>${v}</small></div>
      </div>
    `).join("");
  }

  /* 🟣 YiJing */
  if (site.mode === "iching") {
    const picked = [];
    while (picked.length < site.count) {
      const n = Math.floor(Math.random() * site.items.length);
      if (!picked.includes(n)) picked.push(n);
    }

    return picked.map(i => {
      const g = site.items[i];
      return `
        <div class="card-toggle" style="width:140px; text-align:center;">
          <div class="card-face">
            <b>${g.number}. ${g.name}</b><br>
            <div>${g.symbols.slice().reverse().join("<br>")}</div>
          </div>
          <div class="card-meaning" style="display:none;">
            <small>${g.keyword}</small>
          </div>
        </div>
      `;
    }).join("");
  }

  /* 🟣 items 기반 덱 */
  if (site.items && Array.isArray(site.items)) {
    const picked = [];
    while (picked.length < site.count) {
      const n = Math.floor(Math.random() * site.items.length);
      if (!picked.includes(n)) picked.push(n);
    }

    return picked.map(i => {
      const card = site.items[i];

      // 이미지 카드
      if (card.file) {
        return `
          <div class="card-toggle" style="width:100px; text-align:center;">
            <img src="${site.folder}/${card.file}" style="width:100%;">
            <div class="card-meaning" style="display:none;">
              <small>${card.meaning || ""}<br>${card.advice || ""}</small>
            </div>
          </div>
        `;
      }

      // Lenormand
      if (site.id === "lenormand") {
        return `
          <div class="card-toggle" style="width:100px; text-align:center;">
            <div class="card-face" style="font-size:2rem;">${card.img}</div>
            <div class="card-meaning" style="display:none;">
              <small>${card.name}<br>${card.meaning}</small>
            </div>
          </div>
        `;
      }

      // Rune (배열형)
      if (Array.isArray(card)) {
        return `
          <div class="card-toggle" style="width:120px; text-align:center;">
            <div class="card-face"><b>${card[0]}</b></div>
            <div class="card-meaning" style="display:none;">
              <small>${card[1] || ""}<br>${card[2] || ""}</small>
            </div>
          </div>
        `;
      }

      // 기타 객체형
      return `
        <div class="card-toggle" style="width:120px; text-align:center;">
          <div class="card-face"><b>${card.name}</b></div>
          <div class="card-meaning" style="display:none;">
            <small>
              ${(card.keywords?.positive || []).join(", ")}<br>
              ${(card.keywords?.negative || []).join(", ")}
            </small>
          </div>
        </div>
      `;
    }).join("");
  }

  /* 🟣 이미지 랜덤형 */
  const picked = [];
  while (picked.length < site.count) {
    const num = Math.floor(Math.random() * site.total);
    const ext = site.exts[Math.floor(Math.random() * site.exts.length)];
    const f = String(num).padStart(2, "0") + "." + ext;
    if (!picked.includes(f)) picked.push(f);
  }

  return picked.map(f => `
    <div class="card-toggle" style="width:100px;">
      <img src="${site.folder}/${f}" style="width:100%;">
    </div>
  `).join("");
}

/* 카드 클릭 → 뜻 토글 */
document.addEventListener("click", e => {
  const card = e.target.closest(".card-toggle");
  if (!card) return;

  const meaning = card.querySelector(".card-meaning");
  if (!meaning) return;

  meaning.style.display =
    meaning.style.display === "block" ? "none" : "block";
});

/* 🔹 덱 선택 + 카드 장수 토글 생성 */
window.addEventListener("DOMContentLoaded", () => {
  const optionsDiv = document.getElementById("options");

  sites.forEach(site => {
    const wrap = document.createElement("div");
    wrap.style.display = "flex";
    wrap.style.alignItems = "center";
    wrap.style.gap = "6px";

    wrap.innerHTML = `
      <label style="flex:1;">
        <input type="checkbox" class="deck-check" value="${site.id}">
        ${site.name}
      </label>

      <select class="deck-count" data-id="${site.id}"
        style="display:none; font-size:0.85rem;">
        ${[1,2,3,4,6,9]
          .filter(n => !site.total || n <= site.total)
          .map(n => `<option value="${n}">${n}장</option>`)
          .join("")}
      </select>
    `;

    optionsDiv.appendChild(wrap);
  });

  // 체크 시 장수 선택 토글
  optionsDiv.addEventListener("change", e => {
    if (!e.target.classList.contains("deck-check")) return;

    const select = e.target
      .closest("div")
      .querySelector(".deck-count");

    if (select) {
      select.style.display = e.target.checked ? "inline-block" : "none";
    }
  });
});
</script>

<script>
document.getElementById("drawBtn").addEventListener("click", () => {
  const results = document.getElementById("results");
  results.innerHTML = "";

  const question = document.getElementById("question")?.value?.trim();
  if (question) {
    results.innerHTML += `<h2 style="margin-bottom:16px;">질문: ${question}</h2>`;
  }

  const checkedDecks = document.querySelectorAll(".deck-check:checked");

  checkedDecks.forEach(chk => {
    const site = sites.find(s => s.id === chk.value);
    if (!site) return;

    const select = document.querySelector(`.deck-count[data-id="${site.id}"]`);
    if (select) site.count = parseInt(select.value, 10);

    const block = document.createElement("div");
    block.innerHTML = `
      <h2>${site.name} (${site.count}장)</h2>
      <div class="cards">
        ${drawCards(site)}
      </div>
    `;
    results.appendChild(block);
  });
});
